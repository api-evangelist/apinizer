naftiko: 1.0.0-alpha2
info:
  label: Apinizer API — Gateways
  description: 'Apinizer API — Gateways. 2 operations. Lead operation: List Gateways. Self-contained Naftiko capability covering
    one Apinizer business surface.'
  tags:
  - Apinizer
  - Gateways
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APINIZER_API_KEY: APINIZER_API_KEY
capability:
  consumes:
  - type: http
    namespace: apinizer-gateways
    baseUri: https://api.apinizer.com/v1
    description: Apinizer API — Gateways business capability. Self-contained, no shared references.
    resources:
    - name: gateways
      path: /gateways
      operations:
      - name: listgateways
        method: GET
        description: List Gateways
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: creategateway
        method: POST
        description: Create Gateway
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.APINIZER_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: apinizer-gateways-rest
    port: 8080
    description: REST adapter for Apinizer API — Gateways. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/gateways
      name: gateways
      description: REST surface for gateways.
      operations:
      - method: GET
        name: listgateways
        description: List Gateways
        call: apinizer-gateways.listgateways
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: creategateway
        description: Create Gateway
        call: apinizer-gateways.creategateway
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: apinizer-gateways-mcp
    port: 9090
    transport: http
    description: MCP adapter for Apinizer API — Gateways. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-gateways
      description: List Gateways
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: apinizer-gateways.listgateways
      outputParameters:
      - type: object
        mapping: $.
    - name: create-gateway
      description: Create Gateway
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: apinizer-gateways.creategateway
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
